<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Database cylinder -->
  <ellipse cx="200" cy="160" rx="100" ry="36" fill="url(#db)" opacity="0.9"/>
  <rect x="100" y="160" width="200" height="180" fill="url(#db)" opacity="0.9"/>
  <ellipse cx="200" cy="340" rx="100" ry="36" fill="#2563eb" opacity="0.9"/>
  <!-- Database lines -->
  <ellipse cx="200" cy="220" rx="100" ry="36" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.5"/>
  <ellipse cx="200" cy="280" rx="100" ry="36" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.5"/>
  <!-- Shield with checkmark -->
  <path d="M350 200 L350 310 Q350 390 410 420 Q470 390 470 310 L470 200 L410 180 Z" fill="url(#shield)" opacity="0.95"/>
  <path d="M350 200 L350 310 Q350 390 410 420 Q470 390 470 310 L470 200 L410 180 Z" fill="none" stroke="#fff" stroke-width="4" opacity="0.3"/>
  <!-- Checkmark -->
  <polyline points="380,300 402,325 445,270" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow from DB to Shield -->
  <line x1="300" y1="250" x2="340" y2="250" stroke="white" stroke-width="6" opacity="0.6" stroke-linecap="round"/>
  <polyline points="330,240 345,250 330,260" fill="none" stroke="white" stroke-width="6" opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
